<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Social links profile</title>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <link href="./styles.css" rel="stylesheet" />
  </head>
  <body>
    <main>
      <div class="portfolio-details">
        <img
          src="./assets/images/avatar-jessica.jpeg"
          alt="Avatar of Jessica"
          class="avatar"
        />
        <div class="text-center">
          <h1>Jessica Randall</h1>
          <p class="highlighted">
            <span class="sr-only">Jessica's Location: </span>
            London, United Kingdom
          </p>
        </div>
        <p class="text-center">"Front-end developer and avid reader."</p>
      </div>

      <nav>
        <ul class="portfolio-links">
          <li class="link text-center"><a href="#gitHub">GitHub</a></li>
          <li class="link text-center">
            <a href="#frontend-mentor">Frontend Mentor</a>
          </li>
          <li class="link text-center"><a href="#linkedin">LinkedIn</a></li>
          <li class="link text-center"><a href="#twitter">Twitter</a></li>
          <li class="link text-center"><a href="#instagram">Instagram</a></li>
        </ul>
      </nav>
    </main>
  </body>
</html>
